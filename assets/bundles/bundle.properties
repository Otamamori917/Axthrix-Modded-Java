item.aj-RDC.details =[stat]Reality. Disruption. Core.[] \n\n...loading audio log...\n"John what are you holding?"\n"an R.D.C."\n"JOHN WHY ARE YOU HOLDING AN R.D.--"\n\n- Workplace incident audio log
item.aj-CSW.name =CSW
item.aj-CSW.description =a carbon micro tube based wing sturdy and breathable for objects with high instability
item.aj-CSW.details =[stat]Carbon. Stablizing. Wing.[] \n\n"Please Refrain from throwing the CSW's like a boomerang we don't want anymore numbers on the loss of body parts chart thank you"\n\n- Manger of building 9C32
item.aj-cooling-assembly.name =Cooling Assembly
item.aj-cooling-assembly.description =a cooling component used to rapidly cool objects with immense heat emission
item.aj-cooling-assembly.details =[stat]Cools rapidly to Absolute 0[]\n\n"i cant believe i have to say this...\nPlease Refrain from wearing the Cooling assemblies if you accidentally trigger it you will freeze you and everything around you.\nAbsolute 0 IS. NO. JOKE. thank you"\n\n- Manger of building 9C32

item.aj-aqullium.name =Aqullium
item.aj-aqullium.description =A tough and heavy green gemstone
item.aj-aqullium.details =[stat]A Solid Sturdy material.\nComprized of 70% carbon 5% mercury and 25% tungsten[]\n\n"Remember to use a lift to move aqullium is heavier then you think"\n\n- Info Board
item.aj-esperillo.name =Esperillo
item.aj-esperillo.description =A strange resilient material
item.aj-esperillo.details =[stat]A Strange Material that becomes more resilient after receiving damage.\nComprized of 70% copper, 5% Sulfur, and unknown amounts of Dysprosium, Xenon, and Iodine[]\n\n"Esperillo can warp itself around anything spraying an easy to break film of resin on the Material should help"\n\n- Info Board
item.aj-komainium.name =Komainium
item.aj-komainium.description =A Light Material great for structural and resin parts
item.aj-komainium.details =[stat]a malleable light Material.\nComprized of 65% lead, 25% Silver, and unknown amounts of Curium and Samarium.[]\n\n"A great Material many uses"\n\n- Info Board

