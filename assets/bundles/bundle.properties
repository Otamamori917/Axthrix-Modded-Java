  ## Assault Hovers |SubAtomic| quark, electron, baryon, hadron, photon,
unit.aj-quark.name =Quark
unit.aj-quark.description =A little nant, the Quark is an agile hover.\nQuark Fires A Atomic Tri-helix.
unit.aj-electron.name =Electron
unit.aj-electron.description =A Fast Attacker, Electron always has the first strike.\nElectron Fires a burst of superfast charged Particles.
unit.aj-baryon.name =Baryon
unit.aj-baryon.description =A Large Brawler,Baryon Has 2 pistons on its back that help pump energy and expel heat.\nBaryon uses this to expel large amounts of heat damaging any foe that comes too close.\nBaryon Fires A Large Atomic Tri-helix, That Explodes Violently On Contact.
unit.aj-hadron.name =Hadron
unit.aj-hadron.description =Hadron can toss mines behind enemy defences.\nHadron stores up heat and releases it at enemy units.\nHadron Fires A Large Artillery HeatMine, The mines expel heat at enemy units then decays into 4 homing particles.\nhas 2 automatic assault railguns that slow targets and deals more damage to stuctures.
unit.aj-photon.name =Photon
unit.aj-photon.description =[white]The Light of the Gods,[] Photon has an Experimental light Cannon,  dubed "[white]Baldur[]".\nPhoton stores up heat and releases it at enemy units.\nPhoton hits its enemies with the light of the gods themselves, Leaving nothing left of the target.\nHas 2 Large Double Barrel automatic assault railguns that slow targets and deals more damage to stuctures.
  ## Support Walkers |Protect| barrier, blockade, palisade, parapet, impediment,
unit.aj-barrier.name =Barrier
unit.aj-barrier.description =Barrier Fires A single Nanobot that deals DOT.\nHas 2 light Shield drones For defense
unit.aj-blockade.name =Blockade
unit.aj-blockade.description =Blocks Damage and Deals Great Damage at Medium range.\nBlockade Fires ForceFields in quick succession.\nHas 3 light Shield drones For defense
unit.aj-palisade.name =Palisade
unit.aj-palisade.description =A Nimble Walker Deals Heavy Damage at close quarters, Fires A Wave of Nanobots.\nHas 4 Shield drones For defense./nSlows Down And Gives Some resistance To itself and allies when attacking.
unit.aj-parapet.name =Parapet
unit.aj-parapet.description =A Walking Tank, Fire hundreds of Nanobots that can cut though blocks like butter.\ntwo double shot force field launchers as sidearms.\nHas 5 Shield drones For defense.\nSlows Down And Gives Great resistance To itself and allies when attacking.
unit.aj-impediment.name =Impediment
unit.aj-impediment.description =A Unit with 2 Massive Force Field Shotguns.\nProjects Nanobots to heal and boost allies while deteriorating enemies.\nHas 6 heavy Shield drones For defense.\nSlows Down And Gives Great resistance To itself and allies when attacking.
